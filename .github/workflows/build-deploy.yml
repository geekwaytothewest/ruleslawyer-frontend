name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose a deployment environment'
        required: true
        default: 'nonprod'
        type: choice
        options:
          - nonprod
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_REPOSITORY: ruleslawyer-frontend
  ECS_SERVICE: ruleslawyer-frontend
  ECS_CLUSTER: geekway-${{inputs.environment}}
  ROLE_TO_ASSUME: ${{ inputs.environment == 'prod' && secrets.PROD_ROLE_ARN || secrets.NONPROD_ROLE_ARN }}
  # NEXT_PUBLIC_* values are inlined into the bundle at build time, so they must be
  # supplied as a build arg here (not just at runtime in the task definition).
  NEXT_PUBLIC_API_URL: ${{ inputs.environment == 'prod' && 'https://library.geekway.com/api' || 'https://nonprod.library.geekway.com/api' }}
  # Legacy frontend URLs are also inlined at build time. Set these as repo (or
  # environment) variables in GitHub so the real per-env hosts are used instead
  # of the localhost defaults from .env.docker.
  NEXT_PUBLIC_LEGACY_ADMIN_URL: ${{ inputs.environment == 'prod' && vars.LEGACY_ADMIN_URL_PROD || vars.LEGACY_ADMIN_URL_NONPROD }}
  NEXT_PUBLIC_LEGACY_LIBRARIAN_URL: ${{ inputs.environment == 'prod' && vars.LEGACY_LIBRARIAN_URL_PROD || vars.LEGACY_LIBRARIAN_URL_NONPROD }}
  NEXT_PUBLIC_LEGACY_PLAY_PRIZE_ENTRY_URL: ${{ inputs.environment == 'prod' && vars.LEGACY_PLAY_PRIZE_ENTRY_URL_PROD || vars.LEGACY_PLAY_PRIZE_ENTRY_URL_NONPROD }}

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          role-duration-seconds: 1200

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # NEXT_PUBLIC_* is inlined at build time, so it stays a build arg here.
          # Tag with both the commit SHA (immutable record) and latest
          # (the tag the CDK-owned task definition references).
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg NEXT_PUBLIC_LEGACY_ADMIN_URL="$NEXT_PUBLIC_LEGACY_ADMIN_URL" \
            --build-arg NEXT_PUBLIC_LEGACY_LIBRARIAN_URL="$NEXT_PUBLIC_LEGACY_LIBRARIAN_URL" \
            --build-arg NEXT_PUBLIC_LEGACY_PLAY_PRIZE_ENTRY_URL="$NEXT_PUBLIC_LEGACY_PLAY_PRIZE_ENTRY_URL" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger ECS deployment
        run: |
          # The task definition is owned by geekway-infra (CDK). Forcing a new
          # deployment restarts the service so it re-pulls the latest image.
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
